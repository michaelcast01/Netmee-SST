services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: netmee_epp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d netmee_epp"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - netmee_postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - netmee_minio:/data

volumes:
  netmee_postgres:
  netmee_minio:
